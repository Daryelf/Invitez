<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#141414" />
    <meta name="description" content="Open your private digital invitation." />
    <title>Invitez | Digital Invitation</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/globals.css?v=railway-14" />
  </head>
  <body>
    <div class="device-shell invitation-pending" id="device-shell">
      <div class="device-camera" aria-hidden="true"><span></span></div>
      <main id="invitation" class="intro-sequence intro-sequence--locked" aria-label="Digital invitation">
      <audio id="party-song" src="/Nicki%20Minaj%20-%20Moment%204%20Life%20(Remastered)%20(Official%20Video)%20ft.%20Drake%20-%20NickiMinajAtVEVO.mp3" preload="auto"></audio>

      <section class="intro-panel" id="intro-first">
        <video class="intro-video" id="first-video" src="/first.mp4" poster="/first-poster.png" autoplay muted playsinline preload="auto" aria-label="Invitation opening"></video>
        <img class="intro-video autoplay-poster" id="first-poster" src="/first-poster.png" alt="" aria-hidden="true" hidden />
        <button type="button" class="intro-action" id="open-invitation" aria-label="Open invitation">OPEN INVITATION</button>
      </section>

      <section class="intro-panel intro-panel--full" id="intro-second" hidden>
        <div class="vinyl-stage">
          <img class="vinyl-record" id="vinyl-record" src="/vinyl-record.png" alt="" aria-hidden="true" fetchpriority="high" />
        </div>
        <button type="button" class="vinyl-toggle" id="vinyl-toggle" aria-label="Pause vinyl" aria-pressed="false"><span aria-hidden="true"></span></button>

        <video class="intro-video intro-video--full" id="second-video" src="/newsecond.mp4" poster="/secondv2-poster.png" autoplay muted playsinline preload="auto" aria-label="Invitation details"></video>
        <img class="intro-video intro-video--full autoplay-poster autoplay-poster--full" id="second-poster" src="/secondv2-poster.png" alt="" aria-hidden="true" hidden />

        <form class="rsvp-hotspots" id="rsvp-form" aria-label="RSVP form fields">
          <label class="rsvp-text-hotspot rsvp-name-hotspot">
            <span class="sr-only">Name</span>
            <input type="text" name="name" autocomplete="name" placeholder="Name" required />
          </label>
          <fieldset class="rsvp-attendance-hotspots">
            <legend class="sr-only">Will you be attending?</legend>
            <label class="rsvp-radio-hotspot rsvp-radio-hotspot--yes">
              <input type="radio" name="attending" value="yes" required />
              <span aria-hidden="true"></span>
              <span class="sr-only">Yes, I will be there</span>
            </label>
            <label class="rsvp-radio-hotspot rsvp-radio-hotspot--no">
              <input type="radio" name="attending" value="no" />
              <span aria-hidden="true"></span>
              <span class="sr-only">Sorry, I cannot make it</span>
            </label>
          </fieldset>
          <label class="rsvp-text-hotspot rsvp-guest-count-hotspot rsvp-adults-hotspot">
            <span class="sr-only">Number of adults attending</span>
            <input type="number" name="adults" min="0" max="20" step="1" inputmode="numeric" placeholder="0" aria-label="Number of adults attending" />
          </label>
          <label class="rsvp-text-hotspot rsvp-guest-count-hotspot rsvp-kids-hotspot">
            <span class="sr-only">Number of children attending</span>
            <input type="number" name="kids" min="0" max="20" step="1" inputmode="numeric" placeholder="0" aria-label="Number of children attending" />
          </label>
          <label class="rsvp-text-hotspot rsvp-notes-hotspot">
            <span class="sr-only">Additional information</span>
            <textarea name="additionalInformation" placeholder="Additional information"></textarea>
          </label>
          <button type="submit" class="rsvp-submit-hotspot" id="rsvp-submit" aria-label="Submit RSVP">Submit RSVP</button>
          <p class="rsvp-submit-status rsvp-submit-status--idle" id="rsvp-submit-status" aria-live="polite"></p>
        </form>

        <aside class="rsvp-confirmation-card" id="rsvp-confirmation" hidden role="status" aria-live="polite" aria-label="RSVP confirmation">
          <span class="rsvp-confirmation-mark" aria-hidden="true">✓</span>
          <div class="rsvp-confirmation-copy">
            <strong>Your RSVP is in</strong>
            <span id="confirmation-message">Your response was saved.</span>
          </div>
        </aside>

        <div class="countdown-panel" id="details" aria-label="Countdown to October 3 at 7 PM">
          <div class="countdown-bloom countdown-bloom--left" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><i></i></div>
          <div class="countdown-bloom countdown-bloom--right" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><i></i></div>
          <div class="countdown-bow" aria-hidden="true"><span></span><span></span><i></i></div>
          <p class="countdown-kicker">countdown to the ball</p>
          <div class="countdown-grid">
            <div><strong data-countdown="days">00</strong><span>days</span></div>
            <div><strong data-countdown="hours">00</strong><span>hours</span></div>
            <div><strong data-countdown="minutes">00</strong><span>minutes</span></div>
            <div><strong data-countdown="seconds">00</strong><span>seconds</span></div>
          </div>
          <p class="countdown-date"><span aria-hidden="true">♥</span> <span id="countdown-event-label">october 3rd, 2026 · 7:00 pm</span> <span aria-hidden="true">♥</span></p>
        </div>
      </section>
      </main>
      <div class="device-home-indicator" aria-hidden="true"></div>
    </div>

    <script src="/invitation-layout.js?v=7"></script>
    <script>
      const API_ORIGIN = "https://after-hours-party.adventraa.chatgpt.site";
      const OPENED_KEY = "invitez-opening-viewed";
      const invitation = document.querySelector("#invitation");
      const deviceShell = document.querySelector("#device-shell");
      const firstPanel = document.querySelector("#intro-first");
      const secondPanel = document.querySelector("#intro-second");
      const firstVideo = document.querySelector("#first-video");
      const secondVideo = document.querySelector("#second-video");
      const firstPoster = document.querySelector("#first-poster");
      const secondPoster = document.querySelector("#second-poster");
      const song = document.querySelector("#party-song");
      const vinyl = document.querySelector("#vinyl-record");
      const vinylToggle = document.querySelector("#vinyl-toggle");
      const rsvpForm = document.querySelector("#rsvp-form");
      const countdownPanel = document.querySelector("#details");
      const rsvpSubmit = document.querySelector("#rsvp-submit");
      const rsvpStatus = document.querySelector("#rsvp-submit-status");
      const confirmation = document.querySelector("#rsvp-confirmation");
      const nameInput = rsvpForm.elements.namedItem("name");
      const adultsInput = rsvpForm.elements.namedItem("adults");
      const kidsInput = rsvpForm.elements.namedItem("kids");
      const notesInput = rsvpForm.elements.namedItem("additionalInformation");
      const tokenMatch = window.location.pathname.match(/^\/i\/([^/]+)\/?$/);
      const invitationToken = tokenMatch ? decodeURIComponent(tokenMatch[1]) : "";
      const query = new URLSearchParams(window.location.search);
      const freshPreview = query.get("fresh") === "1";
      const confirmationPreview = query.get("confirmation") === "1";
      const layoutEditorMode = query.get("editor") === "1";
      const rsvpLayoutController = window.InvitezLayout.createRsvpLayoutController({
        form: rsvpForm,
        apiOrigin: API_ORIGIN,
        countdown: countdownPanel,
        surface: secondPanel,
      });
      let vinylPaused = false;
      let guestContext = null;
      let currentEvent = {
        eventName: "Erika's Sweet 16",
        eventDate: "October 3, 2026",
        eventTime: "7:00 PM",
        eventIso: "2026-10-03T19:00:00-04:00",
        venue: "Centerville Banquet Hall",
        address: "",
        mapUrl: "",
      };
      let eventTime = new Date(currentEvent.eventIso).getTime();

      function setVinylPaused(paused) {
        vinylPaused = paused;
        vinyl.classList.toggle("vinyl-record--paused", paused);
        vinylToggle.setAttribute("aria-pressed", String(paused));
        vinylToggle.setAttribute("aria-label", paused ? "Play vinyl" : "Pause vinyl");
      }

      function playVideoOrShowFallback(video, fallback) {
        video.muted = true;
        const playAttempt = video.play();
        if (playAttempt) {
          playAttempt
            .then(() => { fallback.hidden = true; })
            .catch(() => { fallback.hidden = false; });
        }
        window.setTimeout(() => {
          if (video.paused && video.currentTime < 0.1) fallback.hidden = false;
        }, 500);
      }

      firstVideo.addEventListener("playing", () => { firstPoster.hidden = true; });
      secondVideo.addEventListener("playing", () => { secondPoster.hidden = true; });

      function markReady() {
        deviceShell.classList.remove("invitation-pending");
        deviceShell.classList.add("invitation-ready");
      }

      function pauseMedia() {
        song.pause();
        song.currentTime = 0;
        firstVideo.pause();
        secondVideo.pause();
      }

      function showOpeningScreen() {
        confirmation.hidden = true;
        rsvpForm.hidden = false;
        invitation.hidden = false;
        pauseMedia();
        firstPanel.hidden = false;
        secondPanel.hidden = true;
        invitation.classList.add("intro-sequence--locked");
        invitation.classList.remove("intro-sequence--unlocked");
        invitation.scrollTop = 0;
        firstVideo.currentTime = 0;
        playVideoOrShowFallback(firstVideo, firstPoster);
        setVinylPaused(false);
      }

      function applyGuestToForm(guest) {
        if (!guest) return;
        nameInput.value = guest.name || "";
        adultsInput.value = guest.partySize > 0 ? String(guest.partySize) : "";
        kidsInput.value = "";
        notesInput.value = guest.additionalInformation || "";
        if (guest.status === "attending" || guest.status === "declined") {
          const value = guest.status === "attending" ? "yes" : "no";
          const radio = rsvpForm.querySelector(`input[name="attending"][value="${value}"]`);
          if (radio) radio.checked = true;
        }
      }

      function applyEvent(event) {
        if (!event) return;
        currentEvent = { ...currentEvent, ...event };
        eventTime = new Date(currentEvent.eventIso).getTime();
        document.title = `${currentEvent.eventName} | Invitez`;
        document.querySelector('meta[name="description"]').setAttribute("content", `Open your private invitation to ${currentEvent.eventName}.`);
        invitation.setAttribute("aria-label", `${currentEvent.eventName} invitation`);
        document.querySelector("#countdown-event-label").textContent = `${currentEvent.eventDate} · ${currentEvent.eventTime}`;
      }

      function showSecondStage(playSong = false, scrollToForm = false) {
        invitation.hidden = false;
        firstPanel.hidden = true;
        secondPanel.hidden = false;
        invitation.classList.remove("intro-sequence--locked");
        invitation.classList.add("intro-sequence--unlocked");
        invitation.scrollTop = 0;
        playVideoOrShowFallback(secondVideo, secondPoster);
        if (playSong) {
          song.currentTime = 0;
          song.play().then(() => setVinylPaused(false)).catch(() => setVinylPaused(true));
        } else {
          song.pause();
          setVinylPaused(true);
        }
        if (scrollToForm) {
          window.setTimeout(() => invitation.scrollTo({ top: secondPanel.scrollHeight * 0.68, behavior: "smooth" }), 120);
        }
      }

      function showConfirmation(context) {
        const guest = context.guest || {};
        const event = context.event || currentEvent;
        applyEvent(event);
        const secondStageIsVisible = !invitation.hidden && !secondPanel.hidden;
        if (!secondStageIsVisible) showSecondStage(false);
        rsvpForm.reset();
        rsvpStatus.className = "rsvp-submit-status rsvp-submit-status--idle";
        rsvpStatus.textContent = "";
        rsvpForm.hidden = true;
        confirmation.hidden = false;
        const attending = guest.status === "attending";
        const guestName = guest.name || "Guest";
        document.querySelector("#confirmation-message").textContent = attending
          ? `See you there, ${guestName}!`
          : `Thank you, ${guestName}.`;
      }

      async function initializeInvitation() {
        try {
          await rsvpLayoutController.load();
          if (layoutEditorMode) {
            showSecondStage(false, true);
            rsvpLayoutController.startEditor();
            return;
          }
          if (confirmationPreview) {
            showConfirmation({ guest: { name: "Preview Guest", status: "attending" }, event: currentEvent });
            return;
          }
          if (invitationToken) {
            const response = await fetch(`${API_ORIGIN}/api/invite/${encodeURIComponent(invitationToken)}`, { cache: "no-store" });
            if (!response.ok) throw new Error("Invitation link not found");
            guestContext = await response.json();
            applyEvent(guestContext.event);
            applyGuestToForm(guestContext.guest);
            if (guestContext.eventDayActive) {
              window.location.replace(`${API_ORIGIN}/event-day?guest=${encodeURIComponent(guestContext.guest.name || "Guest")}`);
              return;
            }
            if (guestContext.guest.status !== "pending") showConfirmation(guestContext);
            else if (guestContext.guest.previouslyOpened && !freshPreview) showSecondStage(false);
            else showOpeningScreen();
          } else {
            const eventResponse = await fetch(`${API_ORIGIN}/api/event-day`, { cache: "no-store" });
            if (eventResponse.ok) {
              const eventData = await eventResponse.json();
              applyEvent(eventData.event);
              if (eventData.active) {
                window.location.replace(`${API_ORIGIN}/event-day`);
                return;
              }
            }
            const alreadyOpened = window.localStorage.getItem(OPENED_KEY) === "1";
            if (alreadyOpened && !freshPreview) showSecondStage(false);
            else showOpeningScreen();
          }
        } catch {
          showOpeningScreen();
        } finally {
          markReady();
        }
      }

      let initializationStarted = false;
      function initializeOnce() {
        if (initializationStarted) return;
        initializationStarted = true;
        void initializeInvitation();
      }
      window.addEventListener("pageshow", initializeOnce);
      window.setTimeout(markReady, 450);
      initializeOnce();

      document.querySelector("#open-invitation").addEventListener("click", () => {
        window.localStorage.setItem(OPENED_KEY, "1");
        showSecondStage(true);
      });

      vinylToggle.addEventListener("click", () => {
        if (vinylPaused) {
          song.play().then(() => setVinylPaused(false)).catch(() => setVinylPaused(true));
        } else {
          song.pause();
          setVinylPaused(true);
        }
      });

      rsvpForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(rsvpForm);
        rsvpSubmit.disabled = true;
        rsvpStatus.className = "rsvp-submit-status rsvp-submit-status--submitting";
        rsvpStatus.textContent = "";

        try {
          const endpoint = invitationToken ? `${API_ORIGIN}/api/invite/${encodeURIComponent(invitationToken)}/rsvp` : `${API_ORIGIN}/api/rsvp`;
          const attending = formData.get("attending");
          const adults = Math.min(20, Math.max(0, Number(formData.get("adults")) || 0));
          const kids = Math.min(20, Math.max(0, Number(formData.get("kids")) || 0));
          const partySize = Math.min(20, adults + kids);
          if (attending === "yes" && partySize < 1) {
            adultsInput.setCustomValidity("Enter at least one adult or child");
            adultsInput.reportValidity();
            throw new Error("Guest count required");
          }
          adultsInput.setCustomValidity("");
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: formData.get("name"),
              attending,
              adults,
              kids,
              guests: partySize,
              partySize,
              additionalInformation: formData.get("additionalInformation"),
            }),
          });
          if (!response.ok) throw new Error("Could not submit RSVP");
          const result = await response.json();
          window.localStorage.setItem(OPENED_KEY, "1");
          const confirmationGuest = result.guest || {
            name: formData.get("name"),
            status: attending === "yes" ? "attending" : "declined",
          };
          guestContext = { guest: confirmationGuest, event: result.event || currentEvent };
          showConfirmation(guestContext);
          window.setTimeout(() => invitation.scrollTo({ top: invitation.scrollHeight, behavior: "smooth" }), 100);
        } catch {
          rsvpStatus.className = "rsvp-submit-status rsvp-submit-status--error";
          rsvpStatus.textContent = "Please try again";
        } finally {
          rsvpSubmit.disabled = false;
        }
      });

      const countdownFields = Object.fromEntries(
        Array.from(document.querySelectorAll("[data-countdown]")).map((element) => [element.dataset.countdown, element]),
      );
      const format = (value) => String(value).padStart(2, "0");

      function updateCountdown() {
        const distance = Math.max(0, eventTime - Date.now());
        const totalSeconds = Math.floor(distance / 1000);
        countdownFields.days.textContent = format(Math.floor(totalSeconds / 86400));
        countdownFields.hours.textContent = format(Math.floor((totalSeconds % 86400) / 3600));
        countdownFields.minutes.textContent = format(Math.floor((totalSeconds % 3600) / 60));
        countdownFields.seconds.textContent = format(totalSeconds % 60);
      }

      updateCountdown();
      window.setInterval(updateCountdown, 1000);

    </script>
  </body>
</html>
